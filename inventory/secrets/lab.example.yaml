# =============================================================================
#  Secrets 範本 — 這是「明文範例 (REPLACE_ME placeholder)」, 真正的 lab.yaml
#  也用明文格式, 但被 .gitignore 強擋, 絕對不 commit.
#
#  使用方式 (rtolab Windows 環境):
#    Copy-Item inventory\secrets\lab.example.yaml inventory\secrets\lab.yaml
#    # 編輯 lab.yaml, 把 REPLACE_ME 換成實際密碼
#    # Lab 預設一律用 VMware1!VMware1! (William Lam 慣例) 就行
#    # Generate-BringupSpec.ps1 直接 ConvertFrom-Yaml 讀, 不需 sops
#
#  (原 vcf9.1-lab 的 sops + age 加密 workflow 不再用 — 那是 Linux automation
#   host 設計; rtolab 用 Windows jumpbox, lab 密碼又是公開 pattern, 加密過度.)
# =============================================================================

esxi:
  root_pw: REPLACE_ME

outer_vcenter:
  sso_admin_pw: REPLACE_ME

inner_vcenter:
  sso_admin_pw: REPLACE_ME

sddc_manager:
  admin_pw: REPLACE_ME
  root_pw:  REPLACE_ME

nsx:
  admin_pw: REPLACE_ME

# VCF 9.0 only — VCF Operations / Fleet Mgmt / Collector 三個 appliance 共用密碼
# (9.1 把 Operations 拆到 day-2, 這節可不填)
operations:
  root_pw:  REPLACE_ME
  admin_pw: REPLACE_ME

# VCF 5.2.1 only — Cloud Builder appliance admin 帳號密碼 (走 Basic Auth)
cloud_builder:
  admin_pw: REPLACE_ME

ad:
  # rtolab.local AD domain admin (kosten.rtolab.local @ 192.168.114.200)
  domain_admin_user: rtolab\\administrator
  domain_admin_pw:   REPLACE_ME

# Lab Constructor / VCF Installer 預設給 management VM 的 root/admin 密碼
deploy_defaults:
  vm_root_pw: REPLACE_ME
