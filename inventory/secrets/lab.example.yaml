# =============================================================================
#  Secrets 範本 — 這是「明文範例」, 真正的 lab.yaml 用 sops 加密過再 commit
#
#  使用方式:
#    cp inventory/secrets/lab.example.yaml inventory/secrets/lab.yaml
#    sops -e -i inventory/secrets/lab.yaml          # 加密成 git 安全的版本
#    sops inventory/secrets/lab.yaml                # 之後編輯都用這個
#
#  讀取方式 (在腳本裡):
#    source scripts/load-secrets.sh
#    echo "$ESXI_ROOT_PW"
# =============================================================================

esxi:
  root_pw: REPLACE_ME

outer_vcenter:
  sso_admin_pw: REPLACE_ME

inner_vcenter:
  sso_admin_pw: REPLACE_ME

sddc_manager:
  admin_pw: REPLACE_ME
  root_pw:  REPLACE_ME

nsx:
  admin_pw: REPLACE_ME

ad:
  domain_admin_user: lab\\administrator
  domain_admin_pw:   REPLACE_ME

# Lab Constructor / VCF Installer 預設給 management VM 的 root/admin 密碼
deploy_defaults:
  vm_root_pw: REPLACE_ME
