# =============================================================================
#  VCF Lab inventory  —  明文, 非敏感資料
#  密碼 / token 放 inventory/secrets/lab.yaml (本機, .gitignore'd)
#
#  同一份 inventory 支援 VCF 9.0 / 9.1 / 5.2.1 三個版本並存的 IP 規劃,
#  三組 FQDN 也並存 (kosten-vcf90-* / kosten-vcf91-* / kosten-vcf521-*).
#  Active version 由 vcf.version 或 cmdline -Version 決定. IP 配置見 ./ip-plan.md.
# =============================================================================

lab:
  name: vcf-m02
  domain: rtolab.local

# -------- 物理 / 基礎服務 (rtolab.local 機房, 三 VCF 版本共用) ------------------
# rtolab.local 是獨立機房環境; 跟其他 git (vcf9.1-lab / vcf9-lab-automation) 的
# 10.0.0.0/23 沒有任何關係, 不要從那邊複製值過來.
infra:
  # SELAB-Cluster 中央 vCenter (跑 nested ESXi VMs 的那台實體外層 vC)
  # rtolab.local 的 nested ESXi 都註冊在這台上. CNAME -> vcenter.vmware.taiwan
  outer_vcenter:
    fqdn:        vc-mgmt.vmware.taiwan
    ip:          172.16.10.100
    user:        administrator@vmwaresso.taiwan   # SSO domain 是 vmwaresso.taiwan (不是 vsphere.local)
    sso_domain:  vmwaresso.taiwan
    cluster:     SELAB-Cluster
    vds:         selab-dswitch
    # 注意: 這台 vC 不在 rtolab.local zone, 不需要在 kosten DNS 加 A record
    # (jumpbox 與外網都能透過 vmware.taiwan zone 自己 resolve 到 172.16.10.100)

  # Nested ESXi deploy 目標 (Layer 1 Deploy-NestedESXi.ps1 用)
  deployment:
    resource_pool:       Kosten
    datastore:           "vsanDatastore (1)"     # 留 vsanDatastore (1), 注意空格 + 括弧
    portgroup:           trunk                    # vDS portgroup, VLAN Trunk [0-4094]
    enable_mac_learning: true                     # nested ESXi 上 guest VM 需要 (或 promiscuous)

  # AD + DNS (rtolab.local zone 權威 DNS + NTP; 跟 VCF mgmt VMs 同 mgmt subnet)
  ad_dns:
    fqdn: kosten.rtolab.local
    ip:   192.168.114.200
    role: [ad, dns, ntp]

  # Automation host / Windows jumpbox
  # 這份 git + 所有 PowerShell 腳本都跑在這台 (c:\Users\Administrator\rtolab)
  # 不在 SELAB-Cluster underlay 內, 走獨立 mgmt 段 (172.16.10.0/24)
  automation_host:
    fqdn:    selab-win2022-jump.rtolab.local
    ip:      172.16.10.32
    netmask: 255.255.255.0
    os:      Windows Server 2022
    user:    Administrator
    role:    [jumpbox, automation, powershell]
    # 注意: scripts/bootstrap-automation-host.sh 是 Ubuntu/Debian 用的,
    # 這台 Windows 不適用; PowerCLI 直接 Install-Module 安裝.

# -------- 網路 underlay (VLAN / portgroup / gateway, 三版本共用) -----------
# SELAB-Cluster underlay: selab-dswitch dvPortgroup 命名 = pg<VLAN>
# 已佔用 (不可動): pg113 / pg119 / pg120 (Sean 的 lab)
# 本 lab 分配: pg114 = mgmt, pg115 = vmotion, pg116 = vsan, pg117 = overlay
network:
  mgmt:    { vlan: 114, cidr: 192.168.114.0/24, gateway: 192.168.114.1, portgroup: selab-dswitch-pg114 }
  vmotion: { vlan: 115, cidr: 192.168.115.0/24, gateway: 192.168.115.1, portgroup: selab-dswitch-pg115 }
  vsan:    { vlan: 116, cidr: 192.168.116.0/24, gateway: 192.168.116.1, portgroup: selab-dswitch-pg116 }
  overlay: { vlan: 117, cidr: 192.168.117.0/24, gateway: 192.168.117.1, portgroup: selab-dswitch-pg117 }

# -------- VCF Management Domain (per-version, IP+FQDN 三組互不重疊) --------
vcf:
  # active version — Generate-BringupSpec.ps1 / New-VcfLab.ps1 的 -Version 會覆蓋
  version: "9.0"

  # 三組 FQDN 命名規則: kosten-vcf<vshort>-<role>.rtolab.local
  #   vshort = 90 / 91 / 521 (對應 9.0 / 9.1 / 5.2.1)
  #   role   = sddc / vc / nsx (VIP) / nsxn1 (NSX node 1) / inst (VCF Installer) /
  #            cb (Cloud Builder, 5.2.1 only) / ops / fleet / coll (9.0 only) /
  #            esx01..04 (ESXi mgmt vmk) / esx01-vmot..04-vmot / esx01-vsan..04-vsan
  versions:

    # ---- VCF 9.1 -----------------------------------------------------------
    "9.1":
      management_domain:
        name: vcf-m02
        sddc_manager:  { fqdn: kosten-vcf91-sddc.rtolab.local,  ip: 192.168.114.10 }
        inner_vcenter: { fqdn: kosten-vcf91-vc.rtolab.local,    ip: 192.168.114.11 }
        nsx_manager:
          fqdn:      kosten-vcf91-nsx.rtolab.local              # cluster VIP FQDN
          vip:       192.168.114.13
          node_fqdn: kosten-vcf91-nsxn1.rtolab.local            # 第一個 manager node
          node_ip:   192.168.114.12
        tep_pool:
          cidr:        192.168.117.0/24
          gateway:     192.168.117.1
          range_start: 192.168.117.32
          range_end:   192.168.117.95
        vcf_installer: { fqdn: kosten-vcf91-inst.rtolab.local,  ip: 192.168.114.5 }
      vmotion_range: { start: 192.168.115.14, end: 192.168.115.17 }
      vsan_range:    { start: 192.168.116.14, end: 192.168.116.17 }

    # ---- VCF 9.0 (含 VCF Operations 三件套) -------------------------------
    "9.0":
      management_domain:
        name: vcf-m02
        sddc_manager:  { fqdn: kosten-vcf90-sddc.rtolab.local,  ip: 192.168.114.35 }
        inner_vcenter: { fqdn: kosten-vcf90-vc.rtolab.local,    ip: 192.168.114.36 }
        nsx_manager:
          fqdn:      kosten-vcf90-nsx.rtolab.local
          vip:       192.168.114.38
          node_fqdn: kosten-vcf90-nsxn1.rtolab.local
          node_ip:   192.168.114.37
        tep_pool:
          cidr:        192.168.117.0/24
          gateway:     192.168.117.1
          range_start: 192.168.117.96
          range_end:   192.168.117.159
        vcf_installer: { fqdn: kosten-vcf90-inst.rtolab.local,  ip: 192.168.114.34 }
        operations:
          fqdn:           kosten-vcf90-ops.rtolab.local
          fqdn_ip:        192.168.114.40
          fleet_fqdn:     kosten-vcf90-fleet.rtolab.local
          fleet_ip:       192.168.114.41
          collector_fqdn: kosten-vcf90-coll.rtolab.local
          collector_ip:   192.168.114.42
      vmotion_range: { start: 192.168.115.30, end: 192.168.115.33 }
      vsan_range:    { start: 192.168.116.30, end: 192.168.116.33 }

    # ---- VCF 5.2.1 (Cloud Builder, 含 PSC remnants 結構) -----------------
    "5.2.1":
      management_domain:
        name: vcf-m02
        sddc_manager:  { fqdn: kosten-vcf521-sddc.rtolab.local, ip: 192.168.114.55 }
        inner_vcenter: { fqdn: kosten-vcf521-vc.rtolab.local,   ip: 192.168.114.56 }
        nsx_manager:
          fqdn:      kosten-vcf521-nsx.rtolab.local
          vip:       192.168.114.58
          node_fqdn: kosten-vcf521-nsxn1.rtolab.local
          node_ip:   192.168.114.57
        tep_pool:
          cidr:        192.168.117.0/24
          gateway:     192.168.117.1
          range_start: 192.168.117.160
          range_end:   192.168.117.223
        cloud_builder: { fqdn: kosten-vcf521-cb.rtolab.local,   ip: 192.168.114.54 }
      vmotion_range: { start: 192.168.115.50, end: 192.168.115.53 }
      vsan_range:    { start: 192.168.116.50, end: 192.168.116.53 }

# -------- Nested ESXi hosts (per-version, 同 4 台 VM 但每版本不同 IP) ------
# name            = ESXi hostname (不含後綴)
# nested_vm_name  = 外層 vCenter 上的 VM 名 (含 -90 / -91 / -521 後綴, 區別 deploy)
# fqdn            = ESXi 主機 mgmt vmk FQDN  (kosten-vcf<v>-esx01..04)
# vmotion_fqdn    = vmotion vmk FQDN          (kosten-vcf<v>-esx01-vmot..04-vmot)
# vsan_fqdn       = vsan vmk FQDN             (kosten-vcf<v>-esx01-vsan..04-vsan)
hosts_by_version:

  "9.1":
    - { name: vcf-m02-esx01, fqdn: kosten-vcf91-esx01.rtolab.local, mgmt_ip: 192.168.114.14, vmotion_ip: 192.168.115.14, vsan_ip: 192.168.116.14, vmotion_fqdn: kosten-vcf91-esx01-vmot.rtolab.local, vsan_fqdn: kosten-vcf91-esx01-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx01-91 }
    - { name: vcf-m02-esx02, fqdn: kosten-vcf91-esx02.rtolab.local, mgmt_ip: 192.168.114.15, vmotion_ip: 192.168.115.15, vsan_ip: 192.168.116.15, vmotion_fqdn: kosten-vcf91-esx02-vmot.rtolab.local, vsan_fqdn: kosten-vcf91-esx02-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx02-91 }
    - { name: vcf-m02-esx03, fqdn: kosten-vcf91-esx03.rtolab.local, mgmt_ip: 192.168.114.16, vmotion_ip: 192.168.115.16, vsan_ip: 192.168.116.16, vmotion_fqdn: kosten-vcf91-esx03-vmot.rtolab.local, vsan_fqdn: kosten-vcf91-esx03-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx03-91 }
    - { name: vcf-m02-esx04, fqdn: kosten-vcf91-esx04.rtolab.local, mgmt_ip: 192.168.114.17, vmotion_ip: 192.168.115.17, vsan_ip: 192.168.116.17, vmotion_fqdn: kosten-vcf91-esx04-vmot.rtolab.local, vsan_fqdn: kosten-vcf91-esx04-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx04-91 }

  "9.0":
    - { name: vcf-m02-esx01, fqdn: kosten-vcf90-esx01.rtolab.local, mgmt_ip: 192.168.114.30, vmotion_ip: 192.168.115.30, vsan_ip: 192.168.116.30, vmotion_fqdn: kosten-vcf90-esx01-vmot.rtolab.local, vsan_fqdn: kosten-vcf90-esx01-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx01-90 }
    - { name: vcf-m02-esx02, fqdn: kosten-vcf90-esx02.rtolab.local, mgmt_ip: 192.168.114.31, vmotion_ip: 192.168.115.31, vsan_ip: 192.168.116.31, vmotion_fqdn: kosten-vcf90-esx02-vmot.rtolab.local, vsan_fqdn: kosten-vcf90-esx02-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx02-90 }
    - { name: vcf-m02-esx03, fqdn: kosten-vcf90-esx03.rtolab.local, mgmt_ip: 192.168.114.32, vmotion_ip: 192.168.115.32, vsan_ip: 192.168.116.32, vmotion_fqdn: kosten-vcf90-esx03-vmot.rtolab.local, vsan_fqdn: kosten-vcf90-esx03-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx03-90 }
    - { name: vcf-m02-esx04, fqdn: kosten-vcf90-esx04.rtolab.local, mgmt_ip: 192.168.114.33, vmotion_ip: 192.168.115.33, vsan_ip: 192.168.116.33, vmotion_fqdn: kosten-vcf90-esx04-vmot.rtolab.local, vsan_fqdn: kosten-vcf90-esx04-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx04-90 }

  "5.2.1":
    - { name: vcf-m02-esx01, fqdn: kosten-vcf521-esx01.rtolab.local, mgmt_ip: 192.168.114.50, vmotion_ip: 192.168.115.50, vsan_ip: 192.168.116.50, vmotion_fqdn: kosten-vcf521-esx01-vmot.rtolab.local, vsan_fqdn: kosten-vcf521-esx01-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx01-521 }
    - { name: vcf-m02-esx02, fqdn: kosten-vcf521-esx02.rtolab.local, mgmt_ip: 192.168.114.51, vmotion_ip: 192.168.115.51, vsan_ip: 192.168.116.51, vmotion_fqdn: kosten-vcf521-esx02-vmot.rtolab.local, vsan_fqdn: kosten-vcf521-esx02-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx02-521 }
    - { name: vcf-m02-esx03, fqdn: kosten-vcf521-esx03.rtolab.local, mgmt_ip: 192.168.114.52, vmotion_ip: 192.168.115.52, vsan_ip: 192.168.116.52, vmotion_fqdn: kosten-vcf521-esx03-vmot.rtolab.local, vsan_fqdn: kosten-vcf521-esx03-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx03-521 }
    - { name: vcf-m02-esx04, fqdn: kosten-vcf521-esx04.rtolab.local, mgmt_ip: 192.168.114.53, vmotion_ip: 192.168.115.53, vsan_ip: 192.168.116.53, vmotion_fqdn: kosten-vcf521-esx04-vmot.rtolab.local, vsan_fqdn: kosten-vcf521-esx04-vsan.rtolab.local, role: management, nested_vm_name: vcf-m02-esx04-521 }

# -------- ISO / depot / OVA 檔位置 (放在 jumpbox C:\Users\Administrator\rtolab) -------------
# OVA 檔放在 E:\<version>\, 由 Deploy-NestedESXi.ps1 直接 Import-VApp 到外層 vC
artifacts:
  # VCF 9.0 (Nested ESXi 9.0.2 + VCF Installer 9.0.2)
  vcf_90:
    nested_esxi_ova:   E:/9.0/Nested_ESXi9.0.2_Appliance_Template_v1.0.ova
    vcf_installer_ova: E:/9.0/VCF-SDDC-Manager-Appliance-9.0.2.0.25151285.ova
  # VCF 9.1 (Nested ESXi 9.1.0 + VCF Installer 9.1.0)
  vcf_91:
    nested_esxi_ova:   E:/9.1/Nested_ESXi9.1.0.0_Appliance_Template_v1.0.ova
    vcf_installer_ova: E:/9.1/VCF-SDDC-Manager-Appliance-9.1.0.0.25371088.ova
    # (升級 path 用 — 已有 9.0/9.1 OVA 可直接部署, 這兩個檔保留作 day-2 升級)
    # esxi_iso:          E:/9.1/VMware-VMvisor-Installer-9.1.0.0.25370933.x86_64.iso
    # esxi_depot:        E:/9.1/VMware-ESXi-9.1.0.0.25370933-depot.zip
  # VCF 5.2 系列 (label 內部叫 5.2.1, 實際 Cloud Builder 是 5.2.3; Nested 用 8.0u3g)
  vcf_521:
    nested_esxi_ova:   E:/5.2.1/Nested_ESXi8.0u3g_Appliance_Template_v1.ova
    cloud_builder_ova: E:/5.2.1/VMware-Cloud-Builder-5.2.3.0-25219033_OVF10.ova
